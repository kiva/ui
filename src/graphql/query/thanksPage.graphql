query thanksPage {
	hasEverLoggedIn @client
	my {
		id
		teams {
			values {
				id
				team {
					id
					teamPublicId
					name
				}
			}
		}
		lender {
			id
			name
			image {
				id
				url
			}
			publicId
		}
		userAccount {
			id
			firstName
			lastName
			email
			inviterName
			public
		}
		loans {
			totalCount
			values {
				id
			}
		}
		communicationSettings {
			lenderNews
			loanUpdates
		}
	}
	general {
		goal_recommended_loan_enable: uiConfigSetting(key: "ty_goal_set_recommended_loan") {
			key
			value
		}
		ty_page_express_checkout_enabled: uiConfigSetting(key: "enable_ty_page_express_checkout") {
			key
			value
		}
	}
}
