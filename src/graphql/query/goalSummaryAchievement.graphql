query goalSummaryAchievement($year: Int, $loanPurchasesLimit: Int) {
  userAchievementProgress(year: $year) {
    id
    tieredLendingAchievements {
      id
      progressForYear
      loanPurchases(limit: $loanPurchasesLimit) {
        purchaseTime
        loan {
          id
          borrowerCount
        }
      }
    }
  }
}
