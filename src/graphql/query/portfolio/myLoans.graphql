query myLoans(
	$offset: Int = 0,
	$limit: Int = 20,
	$filters: MyLoansSearchFilters,
	$keywordSearch: String,
	$includeFilterOptions: Boolean = true
) {
	my {
		id
		lendingStats @include(if: $includeFilterOptions) {
			id
			countriesLentTo {
				id
				isoCode
				name
			}
			partnersLentTo {
				id
				name
			}
		}
		loans(
			offset: $offset,
			limit: $limit
			filters: $filters,
			keywordSearch: $keywordSearch
		) {
			values {
				id
				name
				status
				use
				image {
					id
					url
				}
				geocode {
					country {
						id
						name
						isoCode
					}
				}
				loanAmount
				loanFundraisingInfo {
					id
					fundedAmount
				}
				sector {
					id
					name
				}
				lenderRepaymentTerm
				terms {
					loanAmount
					expectedPayments {
						dueToKivaDate
					}
				}
				userProperties {
					loanBalance {
						amountPurchasedByLender
						amountRepaidToLender
						latestSharePurchaseTime
					}
				}
				teams {
					values {
						id
						name
						image {
							url
              				id
						}
					}
				}
				... on LoanPartner {
					partnerName
					partnerId
				}
			}
			totalCount
		}
	}
}
