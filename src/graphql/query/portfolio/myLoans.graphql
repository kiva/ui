query myLoans(
	$offset: Int = 0,
	$limit: Int = 20,
	$filters: MyLoansSearchFilters,
	$keywordSearch: String,
	$includeFilterOptions: Boolean = true
) {
	my {
		id
		lendingStats @include(if: $includeFilterOptions) {
			id
			countriesLentTo {
				id
				isoCode
				name
			}
			partnersLentTo {
				id
				name
			}
		}
		teams(limit: 100) @include(if: $includeFilterOptions) {
			values {
				id
				team {
					id
					name
					image {
						id
						url
					}
				}
			}
		}
		loans(
			offset: $offset,
			limit: $limit
			filters: $filters,
			keywordSearch: $keywordSearch
		) {
			values {
				id
				name
				status
				statusLabel
				matchRatio
				image {
					id
					url
				}
				geocode {
					country {
						id
						name
						isoCode
					}
				}
				activity {
					id
					name
				}
				loanFundraisingInfo {
					id
					fundedAmount
				}
				lenderRepaymentTerm
				arrearsAmount
				sharedArrearsAmount
				terms {
					loanAmount
				}
				userProperties {
					canChangeTeamAssignment
					wasMatched
					dedication {
						recipientName
						toKiva
						dedicationUrl
					}
					loanBalance {
						amountPurchasedByLender
						amountPurchasedByPromo
						promoTypeLabel
						amountRepaidToLender
						amountReturnedTotal
						latestSharePurchaseTime
					}
					repaymentHistory {
						createTime
						amount
						type
					}
					userAttributedTeam {
						id
						name
						teamPublicId
						image {
							id
							url
						}
					}
				}
				... on LoanPartner {
					partnerName
					partnerId
				}
				... on LoanDirect {
					trusteeId
					trusteeName
				}
			}
			totalCount
		}
	}
}
