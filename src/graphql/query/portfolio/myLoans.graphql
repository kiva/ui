query myLoans(
	$offset: Int = 0,
	$limit: Int = 20
) {
	my {
		id
		loans(
			offset: $offset,
			limit: $limit
		) {
			values {
				id
				name
				status
				use
				image {
					id
					url
				}
				geocode {
					country {
						id
						name
						isoCode
					}
				}
				loanAmount
				loanFundraisingInfo {
					id
					fundedAmount
				}
				sector {
					id
					name
				}
				lenderRepaymentTerm
				terms {
					loanAmount
					expectedPayments {
						dueToKivaDate
					}
				}
				userProperties {
					loanBalance {
						amountPurchasedByLender
						amountRepaidToLender
						latestSharePurchaseTime
					}
				}
				teams {
					values {
						id
						name
						image {
							url
              				id
						}
					}
				}
				... on LoanPartner {
					partnerName
					partnerId
				}
			}
			totalCount
		}
	}
}
