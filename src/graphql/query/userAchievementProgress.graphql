query UserAchievementProgress($publicId: String, $year: Int, $loanPurchasesLimit: Int = 3) {
  userAchievementProgress(publicId: $publicId, year: $year) {
    id
    lendingAchievements {
      id
      description
      milestoneProgress {
        earnedAtDate
        id
        milestoneStatus
        progress
        target
      }
    }
    tieredLendingAchievements {
      id
      description
      totalProgressToAchievement
      progressForYear
      loanPurchases (limit: $loanPurchasesLimit) {
        loan {
          id
          name
          image {
            id
            hash
            url
          }
        }
      }
      tiers {
        target
        tierStatement
        completedDate
        learnMoreURL
      }
    }
  }
}
